# Pipeline CI/CD pédagogique
# Modèle : événement (on) -> jobs -> steps
# Doc : https://docs.github.com/fr/actions/concepts/workflows-and-actions/workflows
name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # -------- CI : lint + tests + couverture --------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Lancer les tests
        run: pytest --cov=app --cov-report=term-missing --junitxml=report.xml

      - name: Publier le rapport de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests
          path: report.xml

  # -------- CD : build + push Docker Hub (uniquement si les tests passent) --------
  docker:
    name: Build & Push Docker Hub
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskapi:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/taskapi:${{ github.sha }}
